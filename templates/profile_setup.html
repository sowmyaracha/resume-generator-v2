<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Your Profile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f9f9f9;min-height:100vh;padding:40px 24px}
.container{max-width:700px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;background:#0a0a0a;border-radius:50%}
.user-info{display:flex;align-items:center;gap:10px;font-size:13px;color:#606060}
.user-info img{width:32px;height:32px;border-radius:50%}
h1{font-size:24px;font-weight:600;margin-bottom:8px;letter-spacing:-0.3px}
.subtitle{font-size:14px;color:#606060;margin-bottom:32px}
.steps{display:flex;gap:8px;margin-bottom:32px}
.step{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;color:#a0a0a0}
.step.active{background:#0a0a0a;color:#fff;border-color:#0a0a0a}
.step.done{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:28px;margin-bottom:20px}
.card h2{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;color:#606060;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:500;color:#606060;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;color:#0a0a0a;background:#f9f9f9;border:1px solid #e0e0e0;border-radius:6px;padding:10px 14px;outline:none;transition:border-color 0.15s}
.form-group input:focus,.form-group textarea:focus{border-color:#0a0a0a;background:#fff}
.form-group textarea{min-height:80px;resize:vertical}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 20px;border-radius:6px;border:none;cursor:pointer;transition:all 0.15s}
.btn-primary{background:#0a0a0a;color:#fff}
.btn-primary:hover{background:#333}
.btn-secondary{background:#fff;color:#0a0a0a;border:1px solid #e0e0e0}
.btn-secondary:hover{background:#f9f9f9}
.btn-row{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"><span class="logo-dot"></span>AI Resume Generator</div>
    <div class="user-info">
      <span id="userName"></span>
      <a href="/logout" style="color:#606060;font-size:12px;margin-left:8px">Logout</a>
    </div>
  </header>

  <h1>Set up your profile</h1>
  <p class="subtitle">This information will be used to tailor your resume for every job.</p>

  <div class="steps">
    <div class="step active" id="step1">1. Basic Info</div>
    <div class="step" id="step2">2. Experience & Skills</div>
    <div class="step" id="step3">3. Projects & Education</div>
  </div>

  <!-- Page 1: Basic Info -->
  <div id="page1">
    <div class="card">
      <h2>Personal Information</h2>
      <div class="grid-2">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" name="phone" maxlength="10" pattern="[0-9]{10}" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="Enter 10-digit phone number" required>
        </div>
        <div class="form-group">
          <label>LinkedIn URL <span style="font-weight:400;color:var(--gray-400)">(optional)</span></label>
          <input type="text" id="linkedin" placeholder="linkedin.com/in/johndoe">
        </div>
      </div>
      <div class="form-group">
        <label>Professional Summary <span style="font-weight:400;color:var(--gray-400)">(optional)</span></label>
        <textarea id="summary" placeholder="Brief summary of your professional background..."></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="goToPage2()">Next →</button>
    </div>
  </div>

  <!-- Page 2: Experience & Skills -->
  <div id="page2" style="display:none">
    <div class="card">
      <h2>Skills</h2>
      <div class="form-group">
        <label>Technical Skills (comma separated)</label>
        <textarea id="skills" placeholder="Python, FastAPI, React, LangChain, Docker..."></textarea>
      </div>
    </div>
    <div class="card">
      <h2>Work Experience <span style="font-weight:400;color:#a0a0a0;text-transform:none;font-size:12px">(optional)</span></h2>
      <div id="experienceContainer">
        <div class="experience-item" id="exp0">
          <div class="grid-2">
            <div class="form-group">
              <label>Company</label>
              <input type="text" placeholder="Company Name">
            </div>
            <div class="form-group">
              <label>Position</label>
              <input type="text" placeholder="Software Engineer">
            </div>
            <div class="form-group">
              <label>Duration</label>
              <input type="text" placeholder="Jan 2023 - Present">
            </div>
            <div class="form-group">
              <label>Location</label>
              <input type="text" placeholder="New York, USA">
            </div>
          </div>
          <div class="form-group">
            <label>Responsibilities (one per line)</label>
            <textarea placeholder="Built REST APIs using FastAPI...&#10;Reduced latency by 30%..."></textarea>
          </div>
        </div>
      </div>
      <button class="btn btn-secondary" onclick="addExperience()" style="margin-top:8px">+ Add Experience</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goToPage1()">← Back</button>
      <button class="btn btn-primary" onclick="goToPage3()">Next →</button>
    </div>
  </div>

  <!-- Page 3: Projects & Education -->
  <div id="page3" style="display:none">
    <div class="card">
      <h2>Projects</h2>
      <div id="projectsContainer">
        <div class="grid-2">
          <div class="form-group">
            <label>Project Title</label>
            <input type="text" placeholder="AI Resume Generator">
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea placeholder="Built an AI-powered resume tailoring tool using FastAPI and LangChain..."></textarea>
        </div>
      </div>
      <button class="btn btn-secondary" onclick="addProject()" style="margin-top:8px">+ Add Project</button>
    </div>
    <div class="card">
      <h2>Education</h2>
      <div id="educationContainer">
        <div class="grid-2">
          <div class="form-group">
            <label>School</label>
            <input type="text" placeholder="University of Texas">
          </div>
          <div class="form-group">
            <label>Degree</label>
            <input type="text" placeholder="MS Computer Science">
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" placeholder="Austin, TX">
          </div>
          <div class="form-group">
            <label>Duration</label>
            <input type="text" placeholder="2022 - 2024">
          </div>
        </div>
      </div>
      <button class="btn btn-secondary" onclick="addEducation()" style="margin-top:8px">+ Add Education</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goToPage2()">← Back</button>
      <button class="btn btn-primary" onclick="saveProfile()">Save & Continue →</button>
    </div>
  </div>
</div>

<script>
// Load user info
fetch('/user-info').then(r=>r.json()).then(user=>{
  document.getElementById('userName').textContent = user.name;
  document.getElementById('fullName').value = user.name;
  document.getElementById('email').value = user.email;
});

// Load existing profile data if available
fetch('/get-profile').then(r=>r.json()).then(profile=>{
  if(profile.error) return;
  if(profile.name) document.getElementById('fullName').value = profile.name;
  if(profile.email) document.getElementById('email').value = profile.email;
  if(profile.phone) document.getElementById('phone').value = profile.phone;
  if(profile.linkedin) document.getElementById('linkedin').value = profile.linkedin;
  if(profile.summary) document.getElementById('summary').value = profile.summary;
  if(profile.skills) document.getElementById('skills').value = profile.skills.join(', ');

  if(profile.work_experience && profile.work_experience.length > 0){
    const container = document.getElementById('experienceContainer');
    container.innerHTML = '';
    profile.work_experience.forEach((exp, i) => {
      if(i > 0){ const d = document.createElement('div'); d.innerHTML = `<hr style="margin:16px 0;border:none;border-top:1px solid #e0e0e0">`; container.appendChild(d); }
      const div = document.createElement('div');
      div.innerHTML = `
        <div class="grid-2">
          <div class="form-group"><label>Company</label><input type="text" value="${exp.company||''}"></div>
          <div class="form-group"><label>Position</label><input type="text" value="${exp.position||''}"></div>
          
          
        </div>
        <div class="form-group"><label>Responsibilities (one per line)</label><textarea>${(exp.responsibilities||[]).join('\n')}</textarea></div>`;
      container.appendChild(div);
    });
  }

  if(profile.projects && profile.projects.length > 0){
    const container = document.getElementById('projectsContainer');
    container.innerHTML = '';
    profile.projects.forEach((proj, i) => {
      if(i > 0){ const d = document.createElement('div'); d.innerHTML = `<hr style="margin:16px 0;border:none;border-top:1px solid #e0e0e0">`; container.appendChild(d); }
      const div = document.createElement('div');
      div.innerHTML = `
        <div class="grid-2"><div class="form-group"><label>Project Title</label><input type="text" value="${proj.title||''}"></div></div>
        <div class="form-group"><label>Description</label><textarea>${proj.description||''}</textarea></div>`;
      container.appendChild(div);
    });
  }

  if(profile.education && profile.education.length > 0){
    const container = document.getElementById('educationContainer');
    container.innerHTML = '';
    profile.education.forEach((edu, i) => {
      if(i > 0){ const d = document.createElement('div'); d.innerHTML = `<hr style="margin:16px 0;border:none;border-top:1px solid #e0e0e0">`; container.appendChild(d); }
      const div = document.createElement('div');
      div.innerHTML = `
        <div class="grid-2">
          <div class="form-group"><label>School</label><input type="text" value="${edu.school||''}"></div>
          <div class="form-group"><label>Degree</label><input type="text" value="${edu.degree||''}"></div>
          <div class="form-group"><label>Location</label><input type="text" value="${edu.location||''}"></div>
          <div class="form-group"><label>Duration</label><input type="text" value="${edu.duration||''}"></div>
        </div>`;
      container.appendChild(div);
    });
  }
});


function goToPage1(){
  document.getElementById('page1').style.display='block';
  document.getElementById('page2').style.display='none';
  document.getElementById('step1').className='step active';
  document.getElementById('step2').className='step';
}

function goToPage2(){
  const name = document.getElementById('fullName').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const linkedin = document.getElementById('linkedin').value.trim();
  const summary = document.getElementById('summary').value.trim();

  if(!name){ alert('Please enter your full name'); return; }
  if(!email){ alert('Please enter your email'); return; }
  if(!phone){ alert('Please enter your phone number'); return; }

  document.getElementById('page1').style.display='none';
  document.getElementById('page2').style.display='block';
  document.getElementById('page3').style.display='none';
  document.getElementById('step1').className='step done';
  document.getElementById('step2').className='step active';
  document.getElementById('step3').className='step';
}

function goToPage3(){
  const skills = document.getElementById('skills').value.trim();
  const skillsList = skills.split(',').filter(s => s.trim().length > 0);
  
  if(!skills){ alert('Please enter your skills'); return; }
  if(skillsList.length < 5){ alert('Please enter at least 5 skills (comma separated)'); return; }

  const expItemsCheck = document.querySelectorAll('#experienceContainer > div');
  for(let item of expItemsCheck){
    const inputs = item.querySelectorAll('input');
    if(inputs.length < 2) continue;
    const textarea = item.querySelector('textarea');
    const company = inputs[0]?.value.trim();
    const position = inputs[1]?.value.trim();
    const responsibilities = textarea?.value.trim();
    const anyFilled = company || position || responsibilities;
    const allFilled = company && position && responsibilities;
    if(anyFilled && !allFilled){
      alert('Please fill all work experience fields (Company, Position and Responsibilities) or leave them all empty.');
      return;
    }
    if(responsibilities){
      const sentences = responsibilities.split(/[.!?]+/).filter(s => s.trim().length > 0);
      if(sentences.length < 3){
        alert('Please write at least 3-5 sentences for Responsibilities.');
        return;
      }
    }
  }

  const expInputs = document.querySelectorAll('#experienceContainer input');
  const company = expInputs[0]?.value.trim();
  const position = expInputs[1]?.value.trim();
  const duration = expInputs[2]?.value.trim();
  
  
  

  document.getElementById('page2').style.display='none';
  document.getElementById('page3').style.display='block';
  document.getElementById('step2').className='step done';
  document.getElementById('step3').className='step active';
}

function addExperience(){
  const container = document.getElementById('experienceContainer');
  const div = document.createElement('div');
  div.innerHTML = `
    <hr style="margin:16px 0;border:none;border-top:1px solid #e0e0e0">
    <div class="grid-2">
      <div class="form-group"><label>Company</label><input type="text" placeholder="Company Name"></div>
      <div class="form-group"><label>Position</label><input type="text" placeholder="Software Engineer"></div>
    </div>
    <div class="form-group"><label>Responsibilities <span style="font-weight:400;color:#a0a0a0;text-transform:none">(max 200 words)</span></label><textarea placeholder="Write 3-5 sentences describing your key responsibilities..." maxlength="1200" rows="6"></textarea></div>
  `;
  container.appendChild(div);
}

function addProject(){
  const container = document.getElementById('projectsContainer');
  const div = document.createElement('div');
  div.innerHTML = `
    <hr style="margin:16px 0;border:none;border-top:1px solid #e0e0e0">
    <div class="grid-2"><div class="form-group"><label>Project Title</label><input type="text" placeholder="Project Name"></div></div>
    <div class="form-group"><label>Description</label><textarea placeholder="Project description..."></textarea></div>
  `;
  container.appendChild(div);
}

function addEducation(){
  const container = document.getElementById('educationContainer');
  const div = document.createElement('div');
  div.innerHTML = `
    <hr style="margin:16px 0;border:none;border-top:1px solid #e0e0e0">
    <div class="grid-2">
      <div class="form-group"><label>School</label><input type="text" placeholder="University Name"></div>
      <div class="form-group"><label>Degree</label><input type="text" placeholder="BS Computer Science"></div>
      <div class="form-group"><label>Location</label><input type="text" placeholder="City, State"></div>
      <div class="form-group"><label>Duration</label><input type="text" placeholder="2018 - 2022"></div>
    </div>
  `;
  container.appendChild(div);
}

async function saveProfile(){
  // Validate work experience
  const expItemsVal = document.querySelectorAll('#experienceContainer > div');
  for(let item of expItemsVal){
    const inputs = item.querySelectorAll('input');
    if(inputs.length < 2) continue;
    const textarea = item.querySelector('textarea');
    const company = inputs[0]?.value.trim();
    const position = inputs[1]?.value.trim();
    const responsibilities = textarea?.value.trim();
    const anyFilled = company || position || responsibilities;
    const allFilled = company && position && responsibilities;
    if(anyFilled && !allFilled){
      alert('Please fill all work experience fields (Company, Position and Responsibilities) or leave them all empty.');
      return;
    }

  }
    const projTitles = document.querySelectorAll('#projectsContainer input');
    const projDescs = document.querySelectorAll('#projectsContainer textarea');
    
    let validProjects = 0;
    for(let i = 0; i < projTitles.length; i++){
        const title = projTitles[i]?.value.trim();
        const desc = projDescs[i]?.value.trim();
        if(title && desc && desc.split(' ').length >= 10) validProjects++;
    }
    
    if(validProjects < 2){ 
        alert('Please add at least 2 projects with proper titles and descriptions (at least 10 words each)'); 
        return; 
    }

    const expItems = document.querySelectorAll('#experienceContainer > div');
    const experiences = Array.from(expItems).map(item => {
    const inputs = item.querySelectorAll('input');
    const textarea = item.querySelector('textarea');
    return {
      company: inputs[0]?.value || '',
      position: inputs[1]?.value || '',
      duration: '',
      location: '',
      responsibilities: textarea?.value ? [textarea.value] : []
    };
  });

  const projItems = document.querySelectorAll('#projectsContainer > div:not(hr)');
  const projects = Array.from(document.querySelectorAll('#projectsContainer input')).map((inp, i) => {
    const textareas = document.querySelectorAll('#projectsContainer textarea');
    return { title: inp.value, description: textareas[i]?.value || '' };
  });

  const eduInputGroups = document.querySelectorAll('#educationContainer .grid-2');
  const education = Array.from(eduInputGroups).map(group => {
    const inputs = group.querySelectorAll('input');
    return {
      school: inputs[0]?.value || '',
      degree: inputs[1]?.value || '',
      location: inputs[2]?.value || '',
      duration: inputs[3]?.value || ''
    };
  });

  const profileData = {
    name: document.getElementById('fullName').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    linkedin: document.getElementById('linkedin').value,
    summary: document.getElementById('summary').value,
    skills: document.getElementById('skills').value.split(',').map(s => s.trim()),
    work_experience: experiences,
    projects: projects,
    education: education
  };

  const res = await fetch('/save-profile', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(profileData)
  });

  if(res.ok) {
    window.location.href = '/';
  } else {
    alert('Error saving profile. Please try again.');
  }
}
</script>
</body>
</html>
