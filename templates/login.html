<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Generator — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f9f9f9;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.logo{width:48px;height:48px;background:#0a0a0a;border-radius:12px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center}
.logo-dot{width:12px;height:12px;background:#fff;border-radius:50%}
h1{font-size:22px;font-weight:600;margin-bottom:8px;letter-spacing:-0.3px}
p{font-size:14px;color:#606060;margin-bottom:32px;line-height:1.6}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:12px 20px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;text-decoration:none;color:#0a0a0a}
.btn-google:hover{background:#f9f9f9;border-color:#a0a0a0}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#a0a0a0;font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e0e0}
.footer{margin-top:32px;font-size:12px;color:#a0a0a0}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-dot"></div></div>
  <h1>AI Resume Generator</h1>
  <p>Login with Google to get started</p>
  <a href="/auth/google" class="btn-google" id="googleBtn" onclick="this.style.opacity='0.5';this.style.pointerEvents='none'">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </a>
  <div class="footer">By signing in you agree to our terms of service</div>
</div>
</body>
</html>
